services:
  - type: web
    name: fastapi-app
    env: python
    runtime: python-3.12.3
    buildCommand: |
      # Install Python dependencies in uv environment
      uv sync

      # Make sure Playwright installs browsers in the user environment
      export PLAYWRIGHT_BROWSERS_PATH=0
      uv run playwright install chromium --with-deps
    startCommand: uv run uvicorn main:app --host 0.0.0.0 --port $PORT
